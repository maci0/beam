name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: astral-sh/setup-uv@v8

      - name: Build wheel + sdist
        run: cd python && uv build --out-dir dist

      - name: Bundle the bind-mount payload
        # the package + examples are all a container needs (no compiled artifacts)
        run: tar czf beam-bindmount-${GITHUB_REF_NAME}.tar.gz python examples

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
          files: |
            python/dist/*
            beam-bindmount-*.tar.gz
